# LoafRTC Coturn configuration
# Place at /etc/turnserver.conf or /etc/coturn/turnserver.conf

listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0

fingerprint
lt-cred-mech
realm=loafrtc
server-name=loafrtc-turn

# Static long-term credentials expected by server/.env
user=loafuser:CHANGE_ME_STRONG_PASSWORD

# TLS (required for turns:)
cert=/etc/letsencrypt/live/your-domain/fullchain.pem
pkey=/etc/letsencrypt/live/your-domain/privkey.pem

# Network
no-multicast-peers
no-loopback-peers
stale-nonce=600

# Relay port range (open in firewall)
min-port=49152
max-port=65535

# Logging
simple-log
log-file=/var/log/turnserver/turnserver.log

# Quotas
total-quota=0
bps-capacity=0

# Security hardening
no-tlsv1
no-tlsv1_1
cipher-list="ECDH+AESGCM:ECDH+CHACHA20:DH+AESGCM:DH+CHACHA20:!aNULL:!MD5:!DSS"
