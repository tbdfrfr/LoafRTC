name: Build Windows Host

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install host dependencies
        run: npm ci --workspace loafhost

      - name: Build native addon
        working-directory: loafhost
        shell: bash
        run: bash ./scripts/build-native.sh

      - name: Build input bridge
          working-directory: loafhost/input-bridge
        run: |
          go mod download
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
            go build -o ../resources/input-bridge.exe .

      - name: Package NSIS installer
        working-directory: loafhost
        run: npx electron-builder --config electron-builder.yml --win nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loafhost-installer
          path: loafhost/dist/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: loafhost-main-${{ github.run_number }}
          name: LoafHost Main Build ${{ github.run_number }}
          generate_release_notes: true
          files: loafhost/dist/*.exe
